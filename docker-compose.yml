version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:/app/data/dev.db
      - API_PORT=3001
    env_file:
      - .env
    command: npm run dev
    depends_on:
      - db-init

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
    env_file:
      - .env
    command: npm run dev
    depends_on:
      - api

  db-init:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
    command: sh -c "cd apps/api && npx prisma generate && npx prisma migrate deploy"
    environment:
      - DATABASE_URL=file:/app/data/dev.db

volumes:
  db-data:
